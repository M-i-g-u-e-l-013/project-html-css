<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="../PJT-imagens02/logo-nerdshop.png" type="image/x-icon">
    <title>Exercício 20 / C</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            background-color: rgb(202, 241, 145);
    
        }

        h1 {
            background-color: darkgreen;
            color: aliceblue;
            text-align: center;
        }

        a {
            color: red;
            font-weight: bold;
            text-decoration: none;
        }

        a:visited {
            color: darkred;
        }

        a:hover {
            color: black;
            text-decoration: underline;
        }

        a:active {
            color: yellow;
        }

        a::before {
            content: "→ ";
        }

        a::after {
            content: " ←";
        }

        .especial {
            background-color: black;
        }
    </style>
</head>
<body>
    <h1>Personalizando Links</h1>
    <hr>
    <ul>
        <li class="especial"><a href="https://github.com/?locale=pt-br" target="_blank">Repositorio GitHub</a></li>
