<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="../imagens/Tec.png" type="image/x-icon">
    <title>Formulário Moderno</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, Helvetica, sans-serif;
            background: linear-gradient(135deg, #a8e063, #56ab2f);
        }

        header {
            background: #1b5e20;
            color: white;
            text-align: center;
            padding: 20px;
        }

        header > p {
            margin-top: 5px;
        }

        nav {
            background: #2e7d32;
            text-align: center;
            padding: 10px;
        }

        nav a {
            color: white;
            margin: 10px;
            text-decoration: none;
            font-weight: bold;
            padding: 8px 12px;
            border-radius: 8px;
            transition: 0.3s;
        }

        nav a:hover {
            background: #66bb6a;
        }

        main {
            display: flex;
            justify-content: center;
            padding: 30px;
        }

        form {
            background: white;
            padding: 25px;
            border-radius: 12px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }

        fieldset {
            border: 2px solid #c8e6c9;
            border-radius: 10px;
            margin-bottom: 20px;
            padding: 15px;
        }

        legend {
            font-weight: bold;
            color: #2e7d32;
            padding: 0 10px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }

        input[type="text"],
        input[type="number"],
        input[type="email"] {
            width: 100%;
            padding: 8px;
            margin-bottom: 10px;
            border-radius: 6px;
            border: 1px solid #ccc;
            transition: 0.3s;
        }

        input:focus {
            border-color: #66bb6a;
            outline: none;
            box-shadow: 0 0 5px #66bb6a;
        }

        .options {
            margin-bottom: 10px;
        }

        .options label {
            display: inline;
            margin-left: 5px;
            font-weight: normal;
        }

        .buttons {
            text-align: center;
            margin-top: 15px;
        }

        .buttons input {
            padding: 10px 20px;
            margin: 5px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        .submit {
            background: #2e7d32;
            color: white;
        }

        .submit:hover {
            background: #1b5e20;
        }

        .reset {
            background: #c62828;
            color: white;
        }

        .reset:hover {
            background: #8e0000;
        }

        footer {
            background: #1b5e20;
            color: white;
            text-align: center;
            padding: 10px;
        }
    </style>
</head>
<body>

<header>
    <h1>Formulário Moderno</h1>
    <p>Preencha seus dados abaixo</p>
</header>

<nav>
    <a href="#">Home</a>
    <a href="#">Curiosidades</a>
    <a href="#">Contato</a>
</nav>

<main>
    <form action="cadastros.py" method="post">
        
        <fieldset>
            <legend>Dados pessoais</legend>

            <label for="inome">Nome</label>
            <input type="text" id="inome" name="nome" required>

            <label for="iidade">Idade</label>
            <input type="number" id="iidade" name="idade" min="0" max="100">

            <label for="iemail">E-mail</label>
            <input type="email" id="iemail" name="email" required>
        </fieldset>

        <fieldset>
            <legend>Sexo</legend>

            <div class="options">
                <input type="radio" name="sexo" value="masculino" required>
                <label>Masculino</label>
            </div>

            <div class="options">
                <input type="radio" name="sexo" value="feminino">
                <label>Feminino</label>
            </div>
        </fieldset>

        <fieldset>
            <legend>Esportes favoritos</legend>

            <div class="options">
                <input type="checkbox" name="esportes" value="futebol">
                <label>Futebol</label>
            </div>

            <div class="options">
                <input type="checkbox" name="esportes" value="basquete">
                <label>Basquete</label>
            </div>

            <div class="options">
                <input type="checkbox" name="esportes" value="tenis">
                <label>Tênis</label>
            </div>

            <div class="options">
                <input type="checkbox" name="esportes" value="corrida">
                <label>Corrida</label>
            </div>
        </fieldset>

        <div class="buttons">
            <input type="submit" value="Cadastrar" class="submit">
            <input type="reset" value="Limpar" class="reset">
        </div>

    </form>
</main>

<footer>
    <p>Site criado para estudos</p>
</footer>

</body>
</html>
