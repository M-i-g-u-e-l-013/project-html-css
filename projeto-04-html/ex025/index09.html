<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="../imagens/Tec.png" type="image/x-icon">
    <title>Exercicío 25 / I</title>
</head>
<body>
    <header>
        <h1>Testes em Formulários</h1>
    </header>
    <nav>
        <a href="#">Home</a>
        <a href="#">Curiosidades</a>
        <a href="#">Contato</a>
    </nav>
    <main>
        <form action="cadastros.py" method="get" autocomplete="on">

            <div>
                <label for="iano">Ano de Nascimento: </label>
                <input type="number" name="ano" id="iano" required oninput="calcidade()">
            </div>

            <div>
                <label for="iidade">Sua idade é: </label>
                <output id="iidade">0</output>
            </div>

            <div>
                <label for="inum">Número: </label>
                <input type="range" name="numero" id="inum" min="0" max="10" value="5" oninput="ival.innerHTML = Number(inum.value)">
                <output id="ival">5</output>
            </div>

            <div>
                <input type="submit" value="Enviar">
            </div>

            <div>
                <input type="reset" value="Excluir">
            </div>
        </form>

        <script>
            function calcidade() {
                let atual = new Date().getFullYear()
                iidade.innerHTML = Number(atual) - Number(iano.value)
            }
        </script>
    </main>
</body>
</html>
