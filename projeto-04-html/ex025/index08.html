<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="../imagens/Tec.png" type="image/x-icon">
    <title>Exercicío 25 / H</title>
</head>
<body>
    <header>
        <h1>Exemplo de Formulário</h1>
    </header>
    <main>
        <form action="cadastros.py" method="post" autocomplete="on">
            <fieldset>
                
                <legend>Primeiro Número</legend>

                <div>
                    <label for="in1">Número 1: </label>
                    <input type="number" name="n1" id="in1" min="0" required oninput="isoma.innerHTML = Number(in1.value) + Number(in2.value)">
                </div>

            </fieldset>

            <fieldset>

                <legend>Segundo Número: </legend>

                <div>
                    <label for="in2">Número 2:</label>
                    <input type="number" name="n2" id="in2" min="0" required oninput="isoma.innerHTML = Number(in1.value) + Number(in2.value)">
                </div>
            </fieldset>

            <fieldset>

                <legend>Soma dos números</legend>

                <div>
                    <label for="isoma">Soma: </label>
                    <output id="isoma">0</output>
                </div>
            </fieldset>

            <div>
                <input type="submit" value="Enviar">
                <input type="reset" value="Excluir">
            </div>
        </form>
    </main>
</body>
</html>
