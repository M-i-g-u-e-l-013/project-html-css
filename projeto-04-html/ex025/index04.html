<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="../imagens/Tec.png" type="image/x-icon">
    <title>Exercicío 25 / D</title>
</head>
<body>
    <header>
        <h1>Exemplo de Formulário</h1>
    </header>
    <main>
        <form action="imail" method="get" autocomplete="on">
            <fieldset>
                <legend>Dados pessoais</legend>
                <p>
                    <label for="inome">Nome:</label>
                    <input type="text" name="nome" id="inome" required>
                </p>
                <p>
                    <label for="iemail">E-mail:</label>
                    <input type="email" name="email" id="imail" autocomplete="email" required>
                </p>
                <p>
                    <label for="itel">Telefone:</label>
                    <input type="tel" name="telefone" id="itel" autocomplete="tel" required pattern="^\(\d{2}\)\s?\d{4,5}-\d{4}$" placeholder="(xx) xxxx-xxxx">
                </p>
                <p>
                    <input type="submit" value="Cadastrar">
                    <input type="reset" value="Excluir">
                </p>
            </fieldset>
        </form>
    </main>
</body>
</html>
