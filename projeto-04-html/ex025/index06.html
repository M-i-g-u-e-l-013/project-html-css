<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="../imagens/Tec.png" type="image/x-icon">
    <title>Exercicío 25 / F</title>
</head>
<body>
    <header>
        <h1>Elementos nos Formulários</h1>
    </header>
    <main>
        <form action="cadastros.py" method="get" autocomplete="on">
            <p>
                <label for="icor">Cor: </label>
                <input type="color" name="cor" id="icor">
            </p>
            <p>
                <label for="inivel">Nivel de satisfação:</label>
                <input type="range" name="nivel" id="inivel">
            </p>
            <p>
                <label for="ifoto">Foto de perfil:</label>
                <input type="file" name="Foto" id="ifoto">
            </p>
            <p>
                <input type="submit" value="Enviar">
                <input type="reset" value="Excluir">
            </p>
        </form>
    </main>
</body>
</html>
