<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="../imagens/Tec.png" type="image/x-icon">
    <title>testes.com</title>
    <style>
        * {
            margin: 0px;
            padding: 0px;
        }

        body {
            background-color: rgb(165, 212, 165);
            font-family: Arial, Helvetica, sans-serif;
        }

        header {
            background-color: rgb(4, 95, 4);
            color: white;
            text-align: center;
            padding: 15px;
        }

        header > p {
            padding-top: 7px;
        }

        nav {
            background-color: rgb(4, 142, 4);
            padding: 10px;
            text-align: center;
        }

        nav > a {
            text-decoration: none;
            color: white;
            font-weight: bold;
            margin: 12px;
        }

        nav > a:hover {
            background-color: rgb(13, 182, 13);
            padding: 10px;
            border-radius: 12px;
        }

        main {
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        form {
            background-color: white;
            padding: 20px;
            border-radius: 12px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }

        fieldset {
            padding: 10px;
            margin-bottom: 20px;
            border-radius: 12px;
            border: 2px solid rgb(70, 163, 70);
            box-shadow: 10px;
        }

        legend {
            color: rgb(13, 97, 13);
            font-weight: bold;
            margin-bottom: 5px
        }

        input[type="text"],
        input[type="number"],
        input[type="email"] {
            font-weight: bold;
            margin: 3px;
            width: 95%;
            padding: 8px;
            margin-bottom: 10px;
            border-radius: 6px;
            border: 1px solid #ccc;
            transition: 0.3s;
        }

        .buttons {
            text-align: center;
            margin-top: auto;
        }

        .buttons input {
            margin: 7px;
            height: 30px;
            width: 85px;
            border-radius: 10px;
            border: 0px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }

        input[type="submit"] {
            background-color: rgb(13, 181, 13);
            font-weight: bold;
        }

        input[type="reset"] {
            background-color: rgb(228, 31, 31);
            font-weight: bold;
        }

        input[type="reset"]:hover {
            background-color: rgb(172, 17, 17);
        }

        input[type="submit"]:hover {
            background-color: green;
        }

        footer {
            background-color: darkgreen;
            color: white;
            text-align: center;
            padding: 10px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <header>
        <h1>Formulário Moderno</h1>
        <p>Preencha seus dados abaixo</p>
    </header>
    <nav>
        <a href="#">Home</a>
        <a href="#">Curiosidades</a>
        <a href="#">Contato</a>
    </nav>
    <main>
        <form action="cadastros.py" method="post" autocomplete="on">
            <fieldset>

                <legend>Dados Pessoais</legend>

                <div>
                    <label for="inome"><b>Nome:</b></label>
                    <input type="text" name="nome" id="inome" required autocomplete="name"> <br>
                </div>

                <div>
                    <label for="iidade"><b>Idade:</b></label>
                    <input type="number" name="idade" id="iidade" required min="18" max="65"> <br>
                </div>

                <div>
                    <label for="iemail"><b>E-mail:</b></label>
                    <input type="email" name="E-mail" id="iemail">
                </div>
            </fieldset>

            <fieldset>

                <legend>Sexo</legend>

                <div>
                    <label for="sxmasculino"><b>Masculino</b></label>
                    <input type="radio" name="sexo" id="sxmasculino" value="masculino"> <br>
                </div>

                <div>
                    <label for="sxfeminino"><b>Feminino</b></label>
                    <input type="radio" name="sexo" id="sxfeminino" value="feminino">
                </div>
            </fieldset>

            <fieldset>

                <legend>Esportes Favoritos</legend>

                <div>
                    <input type="checkbox" name="esportes" id="Futebol" value="Futebol"> <label for="Futebol"><b>Futebol</b></label>
                </div>

                <div>
                    <input type="checkbox" name="esportes" id="Basquete" value="Basquete"> <label for="Basquete"><b>Basquete</b></label>
                </div>

                <div>
                    <input type="checkbox" name="esportes" id="Tênis" value="Tênis"> <label for="Tênis"><b>Tênis</b></label>
                </div>

                <div>
                    <input type="checkbox" name="esportes" id="corrida" value="Corrida"> <label for="Corrida"><b>Corrida</b></label>
                </div>

            </fieldset>

            <div class="buttons">
                <input type="submit" value="Cadastrar">
                <input type="reset" value="Excluir">
            </div>
        </form>
    </main>
    <footer>
        <p>Site criado para estudos</p>
    </footer>
</body>
</html>
